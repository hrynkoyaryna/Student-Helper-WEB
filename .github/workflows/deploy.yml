name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ] # Пайплайн спрацює, коли ти замерджиш код у main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test 🚀
        # Це виконання умови про обов'язкові тести перед деплоєм
        run: dotnet test --no-build --verbosity normal

      - name: Publish
        run: dotnet publish StudentHelper.Web/StudentHelper.Web.csproj -c Release -o ./publish

      - name: Deploy to Azure Web App ☁️
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'student-helper-web' # Перевір, чи така назва в Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish